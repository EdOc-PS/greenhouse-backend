version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: greenhouse-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: greenhousedb
    ports:
      - "8080:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: